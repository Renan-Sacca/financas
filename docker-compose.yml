services:

  web:
    build: .
    restart: unless-stopped

    volumes:
      - ./app:/app/app
      - ./.env:/app/.env

    env_file:
      - .env

    environment:
      - PYTHONPATH=/app

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.api.rule=Host(`api.financepowder.cloud`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"

      - "traefik.http.services.api.loadbalancer.server.port=8000"

    networks:
      - proxy
      - internal-db

networks:
  proxy:
    external: true
  internal-db:
    external: true
